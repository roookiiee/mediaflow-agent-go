services:
  app:
    build:
      context: .
    container_name: mediaflow-agent
    environment:
      ADDR: ":8080"
      DATA_DIR: /app/data
      LLM_PROVIDER: ${LLM_PROVIDER:-demo}
      LLM_MODEL: ${LLM_MODEL:-demo-mediaflow}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      MILVUS_ENABLED: "true"
      MILVUS_ADDRESS: http://standalone:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-mediaflow_knowledge}
      MILVUS_TIMEOUT_SECONDS: ${MILVUS_TIMEOUT_SECONDS:-20}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-64}
    ports:
      - "8080:8080"
    volumes:
      - mediaflow_data:/app/data
    depends_on:
      standalone:
        condition: service_healthy

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.14
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

volumes:
  mediaflow_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
